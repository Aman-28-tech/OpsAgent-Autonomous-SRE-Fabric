openapi: "3.1.0"
info:
  title: Jira Ticketing MCP Server
  version: "1.0.0"
  description: |
    Model Context Protocol server for Jira ticket management.
    Auto-creates Jira issues from OpsAgent RCA reports.

servers:
  - url: http://localhost:8004
    description: Local development

paths:
  /mcp/tools/list:
    get:
      summary: List available tools
      operationId: listTools
      responses:
        "200":
          description: Tool registry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolDefinition"

  /mcp/tools/call:
    post:
      summary: Execute a tool
      operationId: callTool
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolCallRequest"
      responses:
        "200":
          description: Tool execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCallResponse"
        "404":
          description: Unknown tool

  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service health

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ToolDefinition:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        parameters:
          type: object

    ToolCallRequest:
      type: object
      required: [tool]
      properties:
        tool:
          type: string
        arguments:
          type: object
          default: {}

    ToolCallResponse:
      type: object
      properties:
        tool:
          type: string
        result: {}
        timestamp:
          type: string
          format: date-time
        latency_ms:
          type: number
